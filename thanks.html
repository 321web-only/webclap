<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ありがとう</title>
  <style>
    body {
      background: #f3e8ff; /* ライラック寄り */
      font-family: "Arial", sans-serif;
      text-align: center;
      padding: 50px;
    }

    .container {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #c8a2c8;
    }

    p {
      font-size: 18px;
      color: #666;
    }

    .back-button {
      display: inline-block;
      margin-top: 20px;
      background: linear-gradient(135deg, #ffc0cb, #e6ccff);
      border-radius: 50px;
      padding: 10px 25px;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    .back-button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>💖 ありがとう！</h1>
    <p>拍手してくれてとっても嬉しいです✨</p>

    <a href="index.html" class="back-button">
      もどる
    </a>
  </div>

</body>
</html>
