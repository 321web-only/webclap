<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Web拍手</title>
  <style>
    body {
      background: #fff0f5;
      font-family: "Arial", sans-serif;
      text-align: center;
      padding: 50px;
    }

    .container {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #c8a2c8;
    }

    .clap-button {
      display: inline-block;
      background: linear-gradient(135deg, #ffc0cb, #e6ccff);
      border-radius: 50px;
      padding: 15px 30px;
      font-size: 18px;
      color: white;
      text-decoration: none;
      transition: 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .clap-button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>👏 Web拍手</h1>
    <p>よかったらポチっとしてね!</p>

    <!-- クリックでお礼ページへ -->
    <a href="thanks.html" class="clap-button">
      拍手する 💖
    </a>
  </div>

</body>
</html>
